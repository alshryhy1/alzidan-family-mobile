<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="شجرة عائلة الزيدان">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f1df"/>
      <stop offset="100%" stop-color="#efe2c4"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect x="28" y="28" width="968" height="968" rx="196" fill="none" stroke="#c9a227" stroke-width="10"/>

  <!-- roots -->
  <ellipse cx="512" cy="900" rx="120" ry="36" fill="#1a4d2e" opacity="0.35"/>

  <!-- trunk: grandfather -->
  <path d="M512 860 C470 820 450 760 448 700 C446 640 470 590 512 560 C554 590 578 640 576 700 C574 760 554 820 512 860 Z" fill="#1a4d2e"/>

  <!-- middle trunk: Mutlaq -->
  <path d="M512 560 L512 420" stroke="#1a4d2e" stroke-width="42" stroke-linecap="round"/>

  <!-- five branches from Mutlaq -->
  <path d="M512 420 C430 390 360 330 300 250" stroke="#1a4d2e" stroke-width="28" stroke-linecap="round"/>
  <path d="M512 420 C450 380 400 320 360 250" stroke="#1a4d2e" stroke-width="26" stroke-linecap="round"/>
  <path d="M512 420 L512 230" stroke="#1a4d2e" stroke-width="30" stroke-linecap="round"/>
  <path d="M512 420 C574 380 624 320 664 250" stroke="#1a4d2e" stroke-width="26" stroke-linecap="round"/>
  <path d="M512 420 C594 390 664 330 724 250" stroke="#1a4d2e" stroke-width="28" stroke-linecap="round"/>

  <!-- top leaves -->
  <circle cx="300" cy="230" r="54" fill="#1a4d2e"/>
  <circle cx="360" cy="230" r="50" fill="#c9a227"/>
  <circle cx="512" cy="210" r="58" fill="#1a4d2e"/>
  <circle cx="664" cy="230" r="50" fill="#c9a227"/>
  <circle cx="724" cy="230" r="54" fill="#1a4d2e"/>

  <!-- labels -->
  <text x="512" y="805" text-anchor="middle" direction="rtl" font-family="Tahoma, Arial, sans-serif" font-size="88" font-weight="700" fill="#c9a227">زيدان</text>
  <text x="512" y="500" text-anchor="middle" direction="rtl" font-family="Tahoma, Arial, sans-serif" font-size="64" font-weight="700" fill="#c9a227">مطلق</text>

  <text x="300" y="240" text-anchor="middle" direction="rtl" font-family="Tahoma, Arial, sans-serif" font-size="46" font-weight="700" fill="#f5edd6">لاحم</text>
  <text x="360" y="240" text-anchor="middle" direction="rtl" font-family="Tahoma, Arial, sans-serif" font-size="46" font-weight="700" fill="#1a4d2e">ملحم</text>
  <text x="512" y="220" text-anchor="middle" direction="rtl" font-family="Tahoma, Arial, sans-serif" font-size="48" font-weight="700" fill="#f5edd6">زيدان</text>
  <text x="664" y="240" text-anchor="middle" direction="rtl" font-family="Tahoma, Arial, sans-serif" font-size="46" font-weight="700" fill="#1a4d2e">زايد</text>
  <text x="724" y="240" text-anchor="middle" direction="rtl" font-family="Tahoma, Arial, sans-serif" font-size="46" font-weight="700" fill="#f5edd6">مزيد</text>
</svg>
